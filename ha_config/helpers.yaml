# ============================================================
# Home Assistant — input_number helpers for zone durations
# ============================================================
# Add this to your configuration.yaml:
#   input_number: !include ha_config/helpers.yaml
#
# Or paste the contents into your existing input_number section.
# After saving, restart HA or reload helpers from
#   Settings → System → Restart → Quick reload

